server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/maintainx_auth
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: ${JWT_SECRET}