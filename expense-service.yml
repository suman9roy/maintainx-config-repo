server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/maintainx_expense
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/