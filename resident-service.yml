server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/maintainx_resident
    username: postgres
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Multipart (PDF upload) ──────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB        # per file limit
      max-request-size: 6MB     # total request limit including JSON part

  # ── Kafka producer (resident-service publishes join-request-status-topic) ───
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # Use Spring's JsonSerializer to serialize events to JSON
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: localhost:9092
      group-id: resident-service-group
      auto-offset-reset: earliest
      # Use Spring's JsonDeserializer to deserialize JSON messages to domain objects
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
# ── Document storage ────────────────────────────────────────────────────────
# Local path for uploaded PDFs (flat deed / rental agreement)
# Set DOCUMENT_UPLOAD_DIR in your .env to override
# PRODUCTION: replace with S3 bucket config
document:
  upload-dir: ${DOCUMENT_UPLOAD_DIR}

# ── Eureka ──────────────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  instance:
    prefer-ip-address: true