server:
  port: 8086

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/maintainx_complaint}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}